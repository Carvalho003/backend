services:
  mysql:
    image: 'mysql:latest'
    environment:
      - 'MYSQL_DATABASE=encanto_personalizados'
      - 'MYSQL_PASSWORD=encanto'
      - 'MYSQL_ROOT_PASSWORD=encanto'
      - 'MYSQL_USER=cynapse'
    ports:
      - '3307:3306'

  whatsapp_api:
    image: aldinokemal2104/go-whatsapp-web-multidevice:latest
    command: ["rest"]
    restart: unless-stopped
    ports:
      - '3001:3000'
    env_file:
      - ./infra/whatsapp/.env
    volumes:
      - ./infra/whatsapp/storages:/app/storages
      - ./infra/whatsapp/statics:/app/statics
  
  rabbitmq:
    image: 'rabbitmq:4.2.4-management'
    environment:
    - 'RABBITMQ_DEFAULT_PASS=encanto'
    - 'RABBITMQ_DEFAULT_USER=cynapse'
    ports:
    - "5672:5672" # Porta do RabbitMQ
    - "15672:15672" # Porta da interface de gerenciamento

