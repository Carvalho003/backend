version: '3.8'

services:
  postgres:
    image: postgres:17

    container_name: postgres-encanto

    restart: unless-stopped

    environment:
      POSTGRES_DB: encanto_personalizados
      POSTGRES_USER: cynapse
      POSTGRES_PASSWORD: encanto

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - encanto-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cynapse -d encanto_personalizados"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  encanto-network:
    driver: bridge

volumes:
  postgres_data: