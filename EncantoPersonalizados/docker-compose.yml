version: '3.8'

services:
  mysql:
    image: 'mysql:latest'
    container_name: mysql-encanto
    restart: unless-stopped
    mem_limit: 768m
    mem_reservation: 256m
    environment:
      - MYSQL_DATABASE=encanto_personalizados
      - MYSQL_PASSWORD=encanto
      - MYSQL_ROOT_PASSWORD=encanto
      - MYSQL_USER=cynapse
    ports:
      - '3307:3306'
    networks:
      - encanto-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  whatsapp_api:
    image: aldinokemal2104/go-whatsapp-web-multidevice:latest
    container_name: whatsapp-api
    command: ["rest"]
    restart: unless-stopped
    mem_limit: 384m
    mem_reservation: 128m
    ports:
      - '3001:3000'
    env_file:
      - ./API WHATSAPP/.env
    volumes:
      - ./API WHATSAPP/storages:/app/storages
      - ./API WHATSAPP/statics:/app/statics
    networks:
      - encanto-network
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
  
  rabbitmq:
    image: 'rabbitmq:3.13-management'
    container_name: rabbitmq-encanto
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    environment:
      - RABBITMQ_DEFAULT_PASS=encanto
      - RABBITMQ_DEFAULT_USER=cynapse
      - RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS=-rabbit vm_memory_high_watermark 0.4
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - encanto-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

networks:
  encanto-network:
    driver: bridge