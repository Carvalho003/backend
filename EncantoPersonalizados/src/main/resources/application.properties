spring.application.name=EncantoPersonalizados
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
#spring.jpa.hibernate.naming.physical-strategy=org.springframework.boot.orm.jpa.hibernate.SpringPhysicalNamingStrategy

# permite o acesso ao h2 console: localhost:8080/h2-console
# spring.h2.console.enabled=true

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/encanto_personalizados?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}

upload.directory=uploads
server.error.include-message=always
server.error.include-binding-errors=always
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:0000}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000

jwt.validity=3600000

whatsapp.api.base-url=${WHATSAPP_API_BASE_URL:http://localhost:3001}
whatsapp.api.basic-auth.user=${WHATSAPP_API_USER:}
whatsapp.api.basic-auth.password=${WHATSAPP_API_PASSWORD:}

# Configurações do Scheduler automático de pedidos pendentes
# IMPORTANTE: Todos os tempos abaixo estão em MILISSEGUNDOS
# Exemplos de conversão:
#   - 300000 = 5 minutos (para testes)
#   - 600000 = 10 minutos
#   - 1800000 = 30 minutos
#   - 3600000 = 1 hora
#   - 86400000 = 1 dia
whatsapp.scheduler.enabled=${WHATSAPP_SCHEDULER_ENABLED:true}
# Tempo entre envios de mensagens para pedidos pendentes
whatsapp.scheduler.fixed-rate-ms=${WHATSAPP_SCHEDULER_FIXED_RATE_MS:300000}
# Telefone não é mais usado (mantém-se apenas para compatibilidade)
whatsapp.scheduler.phone=${WHATSAPP_SCHEDULER_PHONE:}
# Mensagem que será enviada automaticamente para pedidos pendentes
whatsapp.scheduler.message=${WHATSAPP_SCHEDULER_MESSAGE:teste}

jwt.


