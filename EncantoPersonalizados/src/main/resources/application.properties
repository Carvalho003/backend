# Nome da aplicacao no Spring Boot.
spring.application.name=EncantoPersonalizados
# Mostra SQL executado pelo Hibernate no log.
spring.jpa.show-sql=true
# Formata o SQL no log para facilitar leitura.
spring.jpa.properties.hibernate.format_sql=true
# Estrategia de schema no startup (update cria/ajusta tabelas automaticamente).
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# Estrategia de nomes implicitos de entidades/colunas no JPA.
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
#spring.jpa.hibernate.naming.physical-strategy=org.springframework.boot.orm.jpa.hibernate.SpringPhysicalNamingStrategy
# Diz ao Spring para inicializar a base de dados com o data.sql
spring.sql.init.mode=always
# MUITO IMPORTANTE: Garante que o data.sql s\u00F3 corre DEPOIS do Hibernate criar as tabelas
spring.jpa.defer-datasource-initialization=true
# permite o acesso ao h2 console: localhost:8080/h2-console
# spring.h2.console.enabled=true

# URL de conexao do banco (com fallback local via variavel de ambiente).
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3307/encanto_personalizados?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}

# Diretorio base para uploads de arquivos.
upload.directory=uploads
# Inclui mensagem detalhada em respostas de erro do servidor.
server.error.include-message=always
# Inclui erros de validacao/binding na resposta de erro.
server.error.include-binding-errors=always
# Usuario do banco (com fallback local).
spring.datasource.username=${DB_USERNAME:root}
# Senha do banco (com fallback local).
spring.datasource.password=${DB_PASSWORD:encanteta}
# Driver JDBC usado para conexao MySQL.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Dialeto SQL do Hibernate para MySQL.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Tempo maximo para obter conexao no pool Hikari (ms).
spring.datasource.hikari.connection-timeout=30000
# Tempo limite de falha na inicializacao do pool Hikari (ms).
spring.datasource.hikari.initialization-fail-timeout=60000

# Validade do token JWT em milissegundos.
jwt.validity=3600000

# Nome da exchange principal do RabbitMQ.
broker.exchange.name=encanto.exchange
# Nome da fila principal do RabbitMQ.
broker.queue.name=encanto.queue
# Nome da fila para eventos de lembrete enviado.
broker.reminders.queue-name=encanto.lembretes.enviados.queue
# Routing key usada para roteamento de lembretes.
broker.reminders.routing-key=lembretes.enviados
# Exchange fanout para eventos de foto de produto.
broker.foto-produto-events.exchange-name=encanto.foto-produto.events.exchange
# Fila que recebe o broadcast de eventos de foto de produto.
broker.foto-produto-events.queue-name=encanto.foto-produto.events.queue
# Host do RabbitMQ (com fallback local).
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
# Porta do RabbitMQ.
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
# Usuario do RabbitMQ.
spring.rabbitmq.username=${RABBITMQ_USERNAME:cynapse}
# Senha do RabbitMQ.
spring.rabbitmq.password=${RABBITMQ_PASSWORD:encanto}

# URL base da API externa de WhatsApp.
whatsapp.api.base-url=${WHATSAPP_API_BASE_URL:http://localhost:3001}
# Usuario para autenticacao basica na API de WhatsApp.
whatsapp.api.basic-auth.user=${WHATSAPP_API_USER:}
# Senha para autenticacao basica na API de WhatsApp.
whatsapp.api.basic-auth.password=${WHATSAPP_API_PASSWORD:}

# Configura\u00E7\u00F5es do Scheduler autom\u00E1tico de pedidos pendentes
# IMPORTANTE: Todos os tempos abaixo est\u00E3o em MILISSEGUNDOS
# Exemplos de convers\u00E3o:
#   - 300000 = 5 minutos (para testes)
#   - 600000 = 10 minutos
#   - 1800000 = 30 minutos
#   - 3600000 = 1 hora
#   - 86400000 = 1 dia
# Liga/desliga o scheduler de envio automatico de mensagens (true = ativada | false = desativado).
whatsapp.scheduler.enabled=${WHATSAPP_SCHEDULER_ENABLED:false}
# Tempo entre envios de mensagens para pedidos pendentes
# Intervalo de execucao do scheduler em milissegundos.
whatsapp.scheduler.fixed-rate-ms=${WHATSAPP_SCHEDULER_FIXED_RATE_MS:300000}
# Telefone n\u00E3o \u00E9 mais usado (mant\u00E9m-se apenas para compatibilidade)
# Campo legado de telefone (mantido apenas por compatibilidade).
whatsapp.scheduler.phone=${WHATSAPP_SCHEDULER_PHONE:}
# Mensagem que ser\u00E1 enviada automaticamente para pedidos pendentes
# Texto padrao enviado automaticamente pelo scheduler.
whatsapp.scheduler.message=${WHATSAPP_SCHEDULER_MESSAGE:esta mensagem est\u00E1 sendo enviada pela api do zap, desculpe o inconveniente}

# Segredo usado para assinar e validar tokens JWT.
jwt.


